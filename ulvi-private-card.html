<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulvi Farajli - CEO Business Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #FF1744 0%, #E91E63 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 30px auto;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(255, 23, 68, 0.3);
            border: 5px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #FF1744 0%, #E91E63 100%) border-box;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .title {
            font-size: 18px;
            text-align: center;
            color: #718096;
            font-style: italic;
            margin-bottom: 15px;
        }

        .company-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .company-logo img {
            height: 60px;
            width: auto;
            max-width: 200px;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #FF1744, transparent);
            margin: 30px 0;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
            color: #2d3748;
        }

        .contact-item .icon {
            font-size: 24px;
            width: 40px;
            text-align: center;
        }

        .contact-item a {
            color: #2d3748;
            text-decoration: none;
            transition: color 0.3s;
        }

        .contact-item a:hover {
            color: #FF1744;
        }

        .qr-section {
            margin-top: 40px;
            text-align: center;
        }

        .qr-title {
            font-size: 14px;
            color: #718096;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .qr-code {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .qr-code img {
            display: block;
            width: 200px;
            height: 200px;
        }

        @media (max-width: 600px) {
            .card-container {
                padding: 30px;
            }
            
            .name {
                font-size: 28px;
            }
            
            .logo {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="logo">
            <img src="https://i.ibb.co/Rp8MTkJ5/Photo-2023.jpg" alt="Ulvi Farajli">
        </div>
        
        <h1 class="name">Ulvi Farajli</h1>
        <p class="title">General Director - Class Education</p>
        
        <div class="company-logo">
            <img src="https://i.ibb.co/rKBhKVx7/Class-logo.png" alt="Class Education">
        </div>
        
        <div class="divider"></div>
        
        <div class="contact-info">
            <div class="contact-item">
                <span class="icon">📞</span>
                <a href="tel:+994709737512">+994 70 973 75 12</a>
            </div>
            
            <div class="contact-item">
                <span class="icon">📧</span>
                <a href="mailto:azeulvifarajli@gmail.com">azeulvifarajli@gmail.com</a>
            </div>
            
            <div class="contact-item">
                <span class="icon">🌐</span>
                <a href="https://classeducation.online" target="_blank">classeducation.online</a>
            </div>
            
            <div class="contact-item">
                <span class="icon">📍</span>
                <span>Baku, Azerbaijan</span>
            </div>
        </div>
        
        <div class="qr-section">
            <p class="qr-title">Scan to Save Contact</p>
            <div class="qr-code">
                <img id="qrimg" alt="QR Code">
            </div>
        </div>
    </div>

    <script>
        const vcardData = `BEGIN:VCARD
VERSION:3.0
FN:Ulvi Farajli
ORG:Class Education
TITLE:General Director
TEL:+994709737512
EMAIL:azeulvifarajli@gmail.com
URL:https://classeducation.online
ADR:;;Baku;;Azerbaijan
END:VCARD`;

        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(vcardData)}`;
        
        document.getElementById('qrimg').src = qrUrl;
    </script>

</body>
</html>
